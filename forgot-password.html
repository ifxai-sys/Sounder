<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sounder — Reset Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .fp-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #021f18;
            padding: 24px;
        }
        .fp-card {
            width: 100%;
            max-width: 420px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 40px 32px;
        }
        .fp-back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: rgba(255,255,255,0.55);
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 28px;
        }
        .fp-back:hover { color: #f4b400; }
        .fp-eyebrow { color: #f4b400; font-size: 11px; font-weight: 700; letter-spacing: 2px; margin-bottom: 10px; text-transform: uppercase; }
        .fp-title { color: white; font-size: 28px; font-weight: 700; letter-spacing: 1px; margin-bottom: 12px; }
        .fp-sub { color: rgba(255,255,255,0.5); font-size: 14px; line-height: 1.6; margin-bottom: 28px; }
        .fp-label { display: block; color: rgba(255,255,255,0.7); font-size: 12px; font-weight: 600; letter-spacing: 1px; margin-bottom: 8px; text-transform: uppercase; }
        .fp-input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            color: white;
            font-size: 14px;
            font-family: inherit;
            margin-bottom: 8px;
        }
        .fp-input:focus { outline: none; border-color: #f4b400; }
        .fp-err { display: none; color: #ff5252; font-size: 13px; margin-bottom: 12px; }
        .fp-btn {
            width: 100%;
            padding: 15px;
            background: #f4b400;
            color: #021f18;
            border: none;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1.5px;
            cursor: pointer;
            margin-top: 12px;
            transition: background 0.25s ease, transform 0.2s ease;
        }
        .fp-btn:hover { background: #ffc61a; transform: translateY(-2px); }
        .fp-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .fp-success {
            display: none;
            color: #2ecc71;
            font-size: 14px;
            line-height: 1.6;
            background: rgba(46,204,113,0.1);
            border: 1px solid rgba(46,204,113,0.3);
            border-radius: 10px;
            padding: 14px 16px;
            margin-top: 16px;
        }
    </style>
</head>
<body>

    <div class="fp-wrap">
        <div class="fp-card">
            <a href="login.html" class="fp-back">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                Back to sign in
            </a>

            <p class="fp-eyebrow">Password Reset</p>
            <h1 class="fp-title">Forgot your password?</h1>
            <p class="fp-sub">Enter the email associated with your account and we'll send you a link to reset your password.</p>

            <form id="fp-form">
                <label class="fp-label">Email Address</label>
                <input type="email" class="fp-input" id="fp-email" placeholder="you@example.com">
                <p class="fp-err" id="fp-err"></p>
                <button type="submit" class="fp-btn" id="fp-btn">SEND RESET LINK</button>
            </form>

            <p class="fp-success" id="fp-success"></p>
        </div>
    </div>

    <script>
        const API_BASE = 'https://sounder-7sxj.onrender.com';

        document.getElementById('fp-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('fp-email').value.trim();
            const err = document.getElementById('fp-err');
            const success = document.getElementById('fp-success');
            err.style.display = 'none';
            success.style.display = 'none';

            if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                err.textContent = 'Enter a valid email address';
                err.style.display = 'block';
                return;
            }

            const btn = document.getElementById('fp-btn');
            btn.textContent = 'Sending…';
            btn.disabled = true;

            try {
                const res = await fetch(`${API_BASE}/api/auth/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();

                if (res.ok) {
                    success.textContent = data.message;
                    success.style.display = 'block';
                    document.getElementById('fp-form').style.display = 'none';
                } else {
                    err.textContent = data.message || 'Something went wrong. Please try again.';
                    err.style.display = 'block';
                    btn.textContent = 'SEND RESET LINK';
                    btn.disabled = false;
                }
            } catch {
                err.textContent = 'Could not reach the server. Please try again in a moment.';
                err.style.display = 'block';
                btn.textContent = 'SEND RESET LINK';
                btn.disabled = false;
            }
        });
    </script>

</body>
</html>
