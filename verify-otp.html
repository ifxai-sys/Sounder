<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sounder — Verify Your Email</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .fp-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #021f18;
            padding: 24px;
        }
        .fp-card {
            width: 100%;
            max-width: 420px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 40px 32px;
        }
        .fp-eyebrow { color: #f4b400; font-size: 11px; font-weight: 700; letter-spacing: 2px; margin-bottom: 10px; text-transform: uppercase; }
        .fp-title { color: white; font-size: 28px; font-weight: 700; letter-spacing: 1px; margin-bottom: 12px; }
        .fp-sub { color: rgba(255,255,255,0.5); font-size: 14px; line-height: 1.6; margin-bottom: 28px; }
        .fp-sub strong { color: rgba(255,255,255,0.85); }
        .fp-label { display: block; color: rgba(255,255,255,0.7); font-size: 12px; font-weight: 600; letter-spacing: 1px; margin-bottom: 8px; text-transform: uppercase; }
        .fp-input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            color: white;
            font-size: 22px;
            letter-spacing: 8px;
            text-align: center;
            font-family: inherit;
            margin-bottom: 8px;
        }
        .fp-input:focus { outline: none; border-color: #f4b400; }
        .fp-err { display: none; color: #ff5252; font-size: 13px; margin-bottom: 12px; }
        .fp-btn {
            width: 100%;
            padding: 15px;
            background: #f4b400;
            color: #021f18;
            border: none;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1.5px;
            cursor: pointer;
            margin-top: 12px;
            transition: background 0.25s ease, transform 0.2s ease;
        }
        .fp-btn:hover { background: #ffc61a; transform: translateY(-2px); }
        .fp-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .fp-success {
            display: none;
            color: #2ecc71;
            font-size: 14px;
            line-height: 1.6;
            background: rgba(46,204,113,0.1);
            border: 1px solid rgba(46,204,113,0.3);
            border-radius: 10px;
            padding: 14px 16px;
            margin-top: 16px;
        }
        .fp-login-link { color: #f4b400; font-size: 13px; font-weight: 600; text-decoration: none; display: inline-block; margin-top: 14px; }
        .fp-resend {
            background: none;
            border: none;
            color: #f4b400;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            padding: 0;
            margin-top: 18px;
        }
        .fp-resend:disabled { color: rgba(255,255,255,0.3); cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="fp-wrap">
        <div class="fp-card">
            <p class="fp-eyebrow">Verify Email</p>
            <h1 class="fp-title" id="fp-heading">Enter your code</h1>
            <p class="fp-sub" id="fp-sub">We sent a 6-digit verification code to <strong id="fp-email">your email</strong>. Enter it below to activate your account.</p>

            <form id="fp-form">
                <label class="fp-label">Verification Code</label>
                <input type="text" class="fp-input" id="fp-otp" placeholder="000000" inputmode="numeric" maxlength="6" autocomplete="one-time-code">

                <p class="fp-err" id="fp-err"></p>
                <button type="submit" class="fp-btn" id="fp-btn">VERIFY EMAIL</button>
            </form>

            <p class="fp-success" id="fp-success"></p>
            <a href="login.html" class="fp-login-link" id="fp-login-link" style="display:none;">Go to sign in →</a>

            <div>
                <button type="button" class="fp-resend" id="fp-resend">Didn't get a code? Resend</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://sounder-7sxj.onrender.com';

        const params = new URLSearchParams(window.location.search);
        const email = params.get('email');

        if (!email) {
            document.getElementById('fp-heading').textContent = 'Missing email';
            document.getElementById('fp-sub').textContent = 'We could not tell which account to verify. Please sign up again or sign in.';
            document.getElementById('fp-form').style.display = 'none';
            document.getElementById('fp-resend').style.display = 'none';
        } else {
            document.getElementById('fp-email').textContent = email;
        }

        // Only allow digits in the OTP field
        document.getElementById('fp-otp').addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/\D/g, '').slice(0, 6);
        });

        document.getElementById('fp-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const otp = document.getElementById('fp-otp').value.trim();
            const err = document.getElementById('fp-err');
            const success = document.getElementById('fp-success');
            err.style.display = 'none';
            success.style.display = 'none';

            if (otp.length !== 6) {
                err.textContent = 'Please enter the 6-digit code';
                err.style.display = 'block';
                return;
            }

            const btn = document.getElementById('fp-btn');
            btn.textContent = 'Verifying…';
            btn.disabled = true;

            try {
                const res = await fetch(`${API_BASE}/api/auth/verify-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otp })
                });
                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('sounder_token', data.token);
                    success.textContent = data.message;
                    success.style.display = 'block';
                    document.getElementById('fp-form').style.display = 'none';
                    document.getElementById('fp-resend').style.display = 'none';
                    document.getElementById('fp-login-link').style.display = 'inline-block';
                    document.getElementById('fp-login-link').textContent = 'Continue to Sounder →';
                    document.getElementById('fp-login-link').href = 'index.html';
                } else {
                    err.textContent = data.message || 'Something went wrong. Please try again.';
                    err.style.display = 'block';
                    btn.textContent = 'VERIFY EMAIL';
                    btn.disabled = false;
                }
            } catch {
                err.textContent = 'Could not reach the server. Please try again in a moment.';
                err.style.display = 'block';
                btn.textContent = 'VERIFY EMAIL';
                btn.disabled = false;
            }
        });

        document.getElementById('fp-resend').addEventListener('click', async () => {
            if (!email) return;
            const resendBtn = document.getElementById('fp-resend');
            const err = document.getElementById('fp-err');
            const success = document.getElementById('fp-success');
            err.style.display = 'none';
            success.style.display = 'none';

            resendBtn.disabled = true;
            resendBtn.textContent = 'Sending…';

            try {
                const res = await fetch(`${API_BASE}/api/auth/resend-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();

                success.textContent = data.message;
                success.style.display = 'block';
            } catch {
                err.textContent = 'Could not reach the server. Please try again in a moment.';
                err.style.display = 'block';
            } finally {
                resendBtn.textContent = "Didn't get a code? Resend";
                let cooldown = 20;
                resendBtn.disabled = true;
                const interval = setInterval(() => {
                    resendBtn.textContent = `Resend available in ${cooldown}s`;
                    cooldown--;
                    if (cooldown < 0) {
                        clearInterval(interval);
                        resendBtn.textContent = "Didn't get a code? Resend";
                        resendBtn.disabled = false;
                    }
                }, 1000);
            }
        });
    </script>

</body>
</html>
