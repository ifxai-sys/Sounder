<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sounder — Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #021f18; min-height: 100vh; }
        .admin-wrap { max-width: 1100px; margin: 0 auto; padding: 40px 24px 100px; }
        .admin-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; flex-wrap: wrap; gap: 16px; }
        .admin-title { color: white; font-size: 28px; font-weight: 700; letter-spacing: 1px; }
        .admin-back { color: rgba(255,255,255,0.5); text-decoration: none; font-size: 13px; font-weight: 600; }
        .admin-back:hover { color: #f4b400; }

        .admin-gate {
            max-width: 420px;
            margin: 100px auto;
            text-align: center;
            color: rgba(255,255,255,0.6);
        }
        .admin-gate a { color: #f4b400; text-decoration: none; font-weight: 700; }

        .admin-panel { display: none; }
        .admin-panel.visible { display: block; }

        .admin-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 32px;
        }
        .admin-card h2 { color: white; font-size: 16px; letter-spacing: 1px; margin-bottom: 20px; text-transform: uppercase; }

        .admin-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .admin-form-grid .full { grid-column: 1 / -1; }
        .admin-field label { display: block; color: rgba(255,255,255,0.6); font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
        .admin-field input, .admin-field textarea {
            width: 100%;
            padding: 11px 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            color: white;
            font-size: 13px;
            font-family: inherit;
        }
        .admin-field textarea { resize: vertical; min-height: 60px; }
        .admin-field input:focus, .admin-field textarea:focus { outline: none; border-color: #f4b400; }
        .admin-checkbox { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
        .admin-checkbox label { margin: 0; }

        .admin-form-actions { display: flex; gap: 12px; margin-top: 20px; }
        .admin-btn {
            padding: 12px 24px;
            border-radius: 50px;
            border: none;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease;
        }
        .admin-btn-primary { background: #f4b400; color: #021f18; }
        .admin-btn-primary:hover { background: #ffc61a; transform: translateY(-2px); }
        .admin-btn-secondary { background: none; border: 1px solid rgba(255,255,255,0.2); color: white; }
        .admin-btn-secondary:hover { border-color: #f4b400; color: #f4b400; }
        .admin-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        .admin-msg { font-size: 13px; margin-top: 14px; display: none; }
        .admin-msg.success { color: #2ecc71; }
        .admin-msg.error { color: #ff5252; }

        .admin-list { display: flex; flex-direction: column; gap: 14px; }
        .admin-product-row {
            display: flex;
            align-items: center;
            gap: 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 14px 18px;
        }
        .admin-product-row img { width: 52px; height: 52px; object-fit: contain; background: rgba(255,255,255,0.05); border-radius: 8px; padding: 6px; flex-shrink: 0; }
        .admin-product-info { flex: 1; min-width: 0; }
        .admin-product-info h3 { color: white; font-size: 14px; margin-bottom: 3px; }
        .admin-product-info p { color: rgba(255,255,255,0.45); font-size: 12px; }
        .admin-product-price { color: #f4b400; font-size: 14px; font-weight: 700; white-space: nowrap; }
        .admin-product-actions { display: flex; gap: 8px; flex-shrink: 0; }
        .admin-icon-btn {
            width: 34px; height: 34px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.15);
            background: none;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .admin-icon-btn:hover { border-color: #f4b400; color: #f4b400; }
        .admin-icon-btn.danger:hover { border-color: #ff5252; color: #ff5252; }

        .admin-empty { color: rgba(255,255,255,0.4); text-align: center; padding: 30px 0; font-size: 14px; }

        @media (max-width: 640px) {
            .admin-form-grid { grid-template-columns: 1fr; }
            .admin-product-row { flex-wrap: wrap; }
        }
    </style>
</head>
<body>

    <!-- Shown if not logged in -->
    <div class="admin-gate" id="admin-gate">
        <p id="gate-message">You need to be signed in to manage products.</p>
        <p style="margin-top:10px;"><a href="login.html" id="gate-link">Go to Sign In →</a></p>
    </div>

    <!-- Shown once logged in -->
    <div class="admin-wrap admin-panel" id="admin-panel">
        <div class="admin-header">
            <div>
                <p style="color:#f4b400; font-size:11px; font-weight:700; letter-spacing:2px; margin-bottom:6px;">PRODUCT MANAGEMENT</p>
                <h1 class="admin-title">SOUNDER ADMIN</h1>
            </div>
            <a href="index.html" class="admin-back">← Back to site</a>
        </div>

        <div class="admin-card">
            <h2 id="form-heading">Add New Product</h2>
            <form id="product-form">
                <input type="hidden" id="product-id">
                <div class="admin-form-grid">
                    <div class="admin-field">
                        <label>Name</label>
                        <input type="text" id="f-name" required>
                    </div>
                    <div class="admin-field">
                        <label>Image path (e.g. assets/airpods.png)</label>
                        <input type="text" id="f-image" required>
                    </div>
                    <div class="admin-field full">
                        <label>Description</label>
                        <textarea id="f-description" required></textarea>
                    </div>
                    <div class="admin-field">
                        <label>Price ($)</label>
                        <input type="number" id="f-price" min="0" step="0.01" required>
                    </div>
                    <div class="admin-field">
                        <label>Old Price ($) — optional, for "sale" badge</label>
                        <input type="number" id="f-oldPrice" min="0" step="0.01">
                    </div>
                    <div class="admin-field">
                        <label>Badge text (e.g. BEST SELLER)</label>
                        <input type="text" id="f-badge">
                    </div>
                    <div class="admin-field">
                        <label>Color label (e.g. PEARL WHITE)</label>
                        <input type="text" id="f-colorLabel">
                    </div>
                    <div class="admin-field">
                        <label>Colors (comma-separated hex, e.g. #F0EDE4,#8B2020)</label>
                        <input type="text" id="f-colors">
                    </div>
                    <div class="admin-field">
                        <label>Rating (0–5)</label>
                        <input type="number" id="f-rating" min="0" max="5" step="0.1" value="5">
                    </div>
                    <div class="admin-field">
                        <label>Review count</label>
                        <input type="number" id="f-reviewCount" min="0" value="0">
                    </div>
                    <div class="admin-field">
                        <label>Stock</label>
                        <input type="number" id="f-stock" min="0" value="100">
                    </div>
                    <div class="admin-field">
                        <label>Sort order (lower shows first)</label>
                        <input type="number" id="f-sortOrder" value="0">
                    </div>
                    <div class="admin-field full admin-checkbox">
                        <input type="checkbox" id="f-featured">
                        <label for="f-featured" style="margin:0;">Featured (highlights the card and shows a "SAVE" badge)</label>
                    </div>
                </div>

                <div class="admin-form-actions">
                    <button type="submit" class="admin-btn admin-btn-primary" id="submit-btn">CREATE PRODUCT</button>
                    <button type="button" class="admin-btn admin-btn-secondary" id="cancel-edit-btn" style="display:none;">CANCEL EDIT</button>
                </div>
                <p class="admin-msg" id="form-msg"></p>
            </form>
        </div>

        <div class="admin-card">
            <h2>Existing Products</h2>
            <div class="admin-list" id="admin-list">
                <p class="admin-empty">Loading…</p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://sounder-7sxj.onrender.com';
        let allProducts = [];

        async function init() {
            const token = localStorage.getItem('sounder_token');
            if (!token) {
                showGate();
                return;
            }
            try {
                const res = await fetch(`${API_BASE}/api/auth/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!res.ok) throw new Error('Not authorized');
                const data = await res.json();

                if (!data.user.isAdmin) {
                    document.getElementById('gate-message').textContent = "You're signed in, but this account doesn't have admin access.";
                    document.getElementById('gate-link').textContent = '← Back to site';
                    document.getElementById('gate-link').href = 'index.html';
                    showGate();
                    return;
                }

                document.getElementById('admin-gate').style.display = 'none';
                document.getElementById('admin-panel').classList.add('visible');
                loadProducts();
            } catch {
                localStorage.removeItem('sounder_token');
                showGate();
            }
        }

        function showGate() {
            document.getElementById('admin-gate').style.display = 'block';
            document.getElementById('admin-panel').classList.remove('visible');
        }

        function authHeaders() {
            return {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${localStorage.getItem('sounder_token')}`
            };
        }

        async function loadProducts() {
            const list = document.getElementById('admin-list');
            try {
                const res = await fetch(`${API_BASE}/api/products`);
                const data = await res.json();
                allProducts = data.products || [];

                if (allProducts.length === 0) {
                    list.innerHTML = '<p class="admin-empty">No products yet — add your first one above.</p>';
                    return;
                }

                list.innerHTML = allProducts.map(p => `
                    <div class="admin-product-row" data-id="${p._id}">
                        <img src="${p.image}" alt="${p.name}">
                        <div class="admin-product-info">
                            <h3>${p.name}</h3>
                            <p>${p.description}</p>
                        </div>
                        <span class="admin-product-price">$${p.price}</span>
                        <div class="admin-product-actions">
                            <button class="admin-icon-btn" data-action="edit" title="Edit">
                                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
                            </button>
                            <button class="admin-icon-btn danger" data-action="delete" title="Delete">
                                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                            </button>
                        </div>
                    </div>
                `).join('');

                list.querySelectorAll('.admin-product-row').forEach(row => {
                    const id = row.dataset.id;
                    row.querySelector('[data-action="edit"]').addEventListener('click', () => editProduct(id));
                    row.querySelector('[data-action="delete"]').addEventListener('click', () => deleteProduct(id));
                });
            } catch {
                list.innerHTML = '<p class="admin-empty">Couldn\'t load products. Please refresh.</p>';
            }
        }

        function editProduct(id) {
            const p = allProducts.find(x => x._id === id);
            if (!p) return;

            document.getElementById('product-id').value = p._id;
            document.getElementById('f-name').value = p.name;
            document.getElementById('f-image').value = p.image;
            document.getElementById('f-description').value = p.description;
            document.getElementById('f-price').value = p.price;
            document.getElementById('f-oldPrice').value = p.oldPrice || '';
            document.getElementById('f-badge').value = p.badge || '';
            document.getElementById('f-colorLabel').value = p.colorLabel || '';
            document.getElementById('f-colors').value = (p.colors || []).join(',');
            document.getElementById('f-rating').value = p.rating;
            document.getElementById('f-reviewCount').value = p.reviewCount;
            document.getElementById('f-stock').value = p.stock;
            document.getElementById('f-sortOrder').value = p.sortOrder;
            document.getElementById('f-featured').checked = !!p.featured;

            document.getElementById('form-heading').textContent = `Editing: ${p.name}`;
            document.getElementById('submit-btn').textContent = 'SAVE CHANGES';
            document.getElementById('cancel-edit-btn').style.display = 'inline-block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetForm() {
            document.getElementById('product-form').reset();
            document.getElementById('product-id').value = '';
            document.getElementById('form-heading').textContent = 'Add New Product';
            document.getElementById('submit-btn').textContent = 'CREATE PRODUCT';
            document.getElementById('cancel-edit-btn').style.display = 'none';
        }

        document.getElementById('cancel-edit-btn').addEventListener('click', resetForm);

        async function deleteProduct(id) {
            const p = allProducts.find(x => x._id === id);
            if (!confirm(`Delete "${p ? p.name : 'this product'}"? This can't be undone.`)) return;

            try {
                const res = await fetch(`${API_BASE}/api/products/${id}`, {
                    method: 'DELETE',
                    headers: authHeaders()
                });
                if (res.ok) {
                    loadProducts();
                } else {
                    const data = await res.json();
                    alert(data.message || 'Could not delete product');
                }
            } catch {
                alert('Could not reach the server. Please try again.');
            }
        }

        document.getElementById('product-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const id = document.getElementById('product-id').value;
            const msg = document.getElementById('form-msg');
            msg.style.display = 'none';

            const payload = {
                name: document.getElementById('f-name').value.trim(),
                image: document.getElementById('f-image').value.trim(),
                description: document.getElementById('f-description').value.trim(),
                price: parseFloat(document.getElementById('f-price').value),
                oldPrice: document.getElementById('f-oldPrice').value ? parseFloat(document.getElementById('f-oldPrice').value) : null,
                badge: document.getElementById('f-badge').value.trim(),
                colorLabel: document.getElementById('f-colorLabel').value.trim(),
                colors: document.getElementById('f-colors').value.split(',').map(c => c.trim()).filter(Boolean),
                rating: parseFloat(document.getElementById('f-rating').value) || 5,
                reviewCount: parseInt(document.getElementById('f-reviewCount').value) || 0,
                stock: parseInt(document.getElementById('f-stock').value) || 0,
                sortOrder: parseInt(document.getElementById('f-sortOrder').value) || 0,
                featured: document.getElementById('f-featured').checked
            };

            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.textContent = id ? 'Saving…' : 'Creating…';

            try {
                const res = await fetch(`${API_BASE}/api/products${id ? '/' + id : ''}`, {
                    method: id ? 'PUT' : 'POST',
                    headers: authHeaders(),
                    body: JSON.stringify(payload)
                });
                const data = await res.json();

                if (res.ok) {
                    msg.textContent = id ? 'Product updated.' : 'Product created.';
                    msg.className = 'admin-msg success';
                    msg.style.display = 'block';
                    resetForm();
                    loadProducts();
                } else {
                    msg.textContent = data.message || 'Something went wrong.';
                    msg.className = 'admin-msg error';
                    msg.style.display = 'block';
                }
            } catch {
                msg.textContent = 'Could not reach the server. Please try again.';
                msg.className = 'admin-msg error';
                msg.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = id ? 'SAVE CHANGES' : 'CREATE PRODUCT';
            }
        });

        init();
    </script>

</body>
</html>
